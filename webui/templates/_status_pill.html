{% macro status_pill(s) %}
{% if s == 'running' or s == 'queued' %}
<span class="pill bg-amber-200 text-amber-800">{{ s }}</span>
{% elif s == 'done' %}
<span class="pill bg-emerald-200 text-emerald-800">{{ s }}</span>
{% elif s == 'failed' %}
<span class="pill bg-rose-200 text-rose-800">{{ s }}</span>
{% elif s == 'aborted' %}
<span class="pill bg-slate-300 text-slate-700">{{ s }}</span>
{% elif s == 'interrupted' %}
<span class="pill bg-amber-100 text-amber-700">{{ s }}</span>
{% else %}
<span class="pill bg-slate-200 text-slate-800">{{ s }}</span>
{% endif %}
{% endmacro %}
