<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}kg-rag-control{% endblock %}</title>
  <script src="/static/vendor/tailwind.min.js"></script>
  <script defer src="/static/vendor/alpine.min.js"></script>
  <script src="/static/vendor/htmx.min.js"></script>
  <script src="/static/vendor/chart.min.js"></script>
  <script src="/static/table.js"></script>
  <script src="/static/per_query_panel.js"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; }
    .pill { @apply px-2 py-0.5 rounded-full text-xs font-medium; }
    [x-cloak] { display: none !important; }
    /* On mobile, force a thin always-visible horizontal scrollbar inside
       wide tables so the user has a discoverable cue for swiping. iOS
       Safari + most Android browsers hide scrollbars on overflow-x by
       default — this brings them back without dominating the design. */
    .scroll-hint { scrollbar-width: thin; }
    .scroll-hint::-webkit-scrollbar { height: 6px; }
    .scroll-hint::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .scroll-hint::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">

<nav class="bg-slate-900 text-slate-100 sticky top-0 z-30" x-data="{ open: false }">
  <div class="max-w-7xl mx-auto px-3 sm:px-4 flex items-center h-12 sm:h-14 gap-3">
    <a href="/" class="font-semibold flex-shrink-0 text-sm sm:text-base">kg-rag-control</a>
    <!-- Desktop links -->
    <div class="hidden md:flex flex-1 min-w-0 items-center gap-4 lg:gap-6 text-sm lg:text-base">
      <a href="/runs" class="hover:text-white text-slate-300">Runs</a>
      <a href="/metrics" class="hover:text-white text-slate-300">Metrics</a>
      <a href="/metrics/recall-ceiling" class="hover:text-white text-slate-300">Pipeline Matrix</a>
      <a href="/metrics/graph-nearness" class="hover:text-white text-slate-300">Graph-Nearness</a>
      <a href="/graph" class="hover:text-white text-slate-300">Knowledge Graph</a>
      <a href="/downloads" class="hover:text-white text-slate-300">Downloads</a>
      <a href="/settings" class="hover:text-white text-slate-300">Settings</a>
    </div>
    <div class="md:hidden flex-1"></div>
    <div id="status-pill"
         hx-get="/api/state" hx-trigger="load, every 5s" hx-swap="innerHTML"
         class="text-xs sm:text-sm flex-shrink-0"></div>
    <!-- Mobile hamburger -->
    <button @click="open = !open"
            type="button"
            class="md:hidden -mr-1 p-1 rounded hover:bg-slate-800 focus:outline-none focus:ring focus:ring-slate-600"
            :aria-expanded="open"
            aria-label="Toggle menu">
      <svg x-show="!open" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6"
           fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
      <svg x-show="open" x-cloak xmlns="http://www.w3.org/2000/svg" class="w-6 h-6"
           fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M6 18L18 6"/>
      </svg>
    </button>
  </div>
  <!-- Mobile dropdown panel -->
  <div x-show="open" x-cloak
       @click.outside="open = false"
       class="md:hidden border-t border-slate-700 px-4 py-2 bg-slate-900 text-sm">
    <a href="/runs"                    class="block py-2 hover:text-white text-slate-300">Runs</a>
    <a href="/metrics"                 class="block py-2 hover:text-white text-slate-300">Metrics</a>
    <a href="/metrics/recall-ceiling"  class="block py-2 hover:text-white text-slate-300">Pipeline Matrix</a>
    <a href="/metrics/graph-nearness"  class="block py-2 hover:text-white text-slate-300">Graph-Nearness</a>
    <a href="/graph"                   class="block py-2 hover:text-white text-slate-300">Knowledge Graph</a>
    <a href="/downloads"               class="block py-2 hover:text-white text-slate-300">Downloads</a>
    <a href="/settings"                class="block py-2 hover:text-white text-slate-300">Settings</a>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
  {% block content %}{% endblock %}
</main>

<script>
// Render the top-right status pill from /api/state payload.
document.body.addEventListener('htmx:afterSwap', function(evt){
  if (evt.target.id !== 'status-pill') return;
  try {
    const d = JSON.parse(evt.target.textContent);
    const busy = d.busy;
    const id = d.current_run_id;
    evt.target.innerHTML = busy
      ? `<a href="/runs/${id}" class="pill bg-amber-500 text-slate-900">● running #${id}</a>`
      : `<span class="pill bg-emerald-500 text-slate-900">○ idle</span>`;
  } catch(e){ evt.target.innerHTML = ''; }
});
</script>
</body>
</html>
